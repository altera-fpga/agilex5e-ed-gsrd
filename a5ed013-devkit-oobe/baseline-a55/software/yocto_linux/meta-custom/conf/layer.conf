# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta_custom"
BBFILE_PATTERN_meta_custom = "^${LAYERDIR}/"
LAYERDIR_meta_custom := "${LAYERDIR}"
export LAYERDIR_meta_custom


BBFILE_PRIORITY_meta_custom = "6"

LAYERDEPENDS_meta_custom = "core"
LAYERSERIES_COMPAT_meta_custom = "main styhead scarthgap"

CUSTOM_UBOOT_DT = "${CUSTOM_UBOOT_DEVICE_TREE}"
CUSTOM_LINUX_DT = "${CUSTOM_LINUX_DEVICE_TREE}"

FPGA_CORE_PGM_ENABLE = "${FPGA_ENABLE_CORE_PGM}"

SSBL_BOOT_SRC = "${SSBL_BOOT_SOURCE}"

KERNEL_BOOTARGS = "${@ ' '.join([d.getVar('KERNEL_BOOTARGS_SD_MMC') if d.getVar('SSBL_BOOT_SRC') == 'mmc0' \
    else d.getVar('KERNEL_BOOTARGS_QSPI') if d.getVar('SSBL_BOOT_SRC') == 'qspi' else ''])}"

GSRD_APP_SYSCHK ??= "true"
SYSCHK_APP = "${GSRD_APP_SYSCHK}"
GSRD_APP_LED_CTRL ??= "true"
LED_CTRL_APP = "${GSRD_APP_LED_CTRL}"
GSRD_APP_REMOTE_DEBUG ??= "false"
REMOTE_DEBUG_APP = "${GSRD_APP_REMOTE_DEBUG}"
GSRD_APP_GPIO_INT_TEST ??= "true"
GPIO_INT_TEST = "${GSRD_APP_GPIO_INT_TEST}"
NET_APP_LINUXPTP ??= "true"
LINUXPTP_APP = "${NET_APP_LINUXPTP}"
NET_LIB_OPEN62541 ??= "true"
OPEN62541_LIB = "${NET_LIB_OPEN62541}"
GSRD_APP_HELLO_WORLD ??= "true"
HELLO_WORLD_APP = "${GSRD_APP_HELLO_WORLD}"

IMAGE_INSTALL:append = "${@bb.utils.contains('GPIO_INT_TEST', 'true', ' pio-interrupt', '', d) if d.getVar('SSBL_BOOT_SOURCE') != 'qspi' else ''}"
IMAGE_INSTALL:append = "${@bb.utils.contains('HELLO_WORLD_APP', 'true', ' hello', '', d) if d.getVar('SSBL_BOOT_SOURCE') != 'qspi' else ''}"
IMAGE_INSTALL:append = "${@'' if d.getVar('SSBL_BOOT_SOURCE') == 'qspi' else ' rootfs-files'}"

# Add variables for wic creation of sdcard image
IMAGE_BOOT_FILES = " \
		uboot.env \
		boot.scr.uimg \
		u-boot.itb \
		kernel.itb \
		"
